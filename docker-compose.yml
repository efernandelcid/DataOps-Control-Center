services:
  postgres:
    image: postgres:16
    container_name: dataops_postgres
    restart: always
    environment:
      POSTGRES_USER: dataops
      POSTGRES_PASSWORD: dataops123
      POSTGRES_DB: dataops_control_center
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: dataops_redis
    restart: always
    ports:
      - "6379:6379"

  pgadmin:
    image: dpage/pgadmin4
    container_name: dataops_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@dataops.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"

  backend:
    build: ./backend
    container_name: dataops_backend
    restart: always
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: dataops_control_center
      DB_USER: dataops
      DB_PASSWORD: dataops123
      MONITOR_INTERVAL_SECONDS: 30
    depends_on:
      - postgres

volumes:
  postgres_data: