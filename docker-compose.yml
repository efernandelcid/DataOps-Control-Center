services:
  postgres:
    image: postgres:16
    container_name: dataops_postgres
    restart: always
    environment:
      POSTGRES_USER: dataops
      POSTGRES_PASSWORD: dataops123
      POSTGRES_DB: dataops_control_center
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: dataops_redis
    restart: always
    ports:
      - "6379:6379"

  pgadmin:
    image: dpage/pgadmin4
    container_name: dataops_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@dataops.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"

volumes:
  postgres_data:
